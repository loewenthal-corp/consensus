---
version: 2

builds:
  - id: consensus
    main: ./cmd/consensus/
    binary: consensus
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/loewenthal-corp/consensus/internal/buildinfo.Version={{ .Version }} -X github.com/loewenthal-corp/consensus/internal/buildinfo.Commit={{ .Commit }} -X github.com/loewenthal-corp/consensus/internal/buildinfo.Date={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: consensus
    ids:
      - consensus
    formats:
      - tar.gz
    name_template: "consensus_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true
