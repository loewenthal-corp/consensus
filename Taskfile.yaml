---
version: "3"

vars:
  CPU_COUNT:
    sh: nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo "4"
  PARALLEL_COUNT:
    sh: echo $(({{.CPU_COUNT}} * 2))
  BUF: go run github.com/bufbuild/buf/cmd/buf
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  GIT_COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  BUILD_TIME:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  LDFLAGS: "-X github.com/loewenthal-corp/consensus/internal/buildinfo.Version={{.VERSION}} -X github.com/loewenthal-corp/consensus/internal/buildinfo.Commit={{.GIT_COMMIT}} -X github.com/loewenthal-corp/consensus/internal/buildinfo.Date={{.BUILD_TIME}}"

env:
  GOCACHE: /tmp/consensus-go-build
  GOMODCACHE: /tmp/consensus-go-mod-cache
  BUF_CACHE_DIR: /tmp/consensus-buf-cache

tasks:
  do:
    desc: "Run generation, formatting, linting, tests, and build"
    cmds:
      - task: generate
      - task: format
      - task: lint
      - task: test
      - task: build

  generate:
    desc: "Generate protobuf and Ent code"
    cmds:
      - task: generate::proto
      - task: generate::ent

  generate::proto:
    desc: "Generate Go code from protobuf contracts"
    cmds:
      - "{{.BUF}} dep update"
      - "{{.BUF}} generate"

  generate::ent:
    desc: "Generate Ent schema code"
    cmds:
      - go run ./internal/postgres/entc.go

  format:
    desc: "Format Go and proto files"
    cmds:
      - go fmt ./...
      - "{{.BUF}} format -w"

  lint:
    desc: "Run Go vet and Buf lint"
    cmds:
      - go vet -p {{.CPU_COUNT}} ./...
      - "{{.BUF}} lint"

  test:
    desc: "Run Go tests"
    cmds:
      - go test -p {{.CPU_COUNT}} -parallel {{.PARALLEL_COUNT}} ./...

  test::ci:
    desc: "Run full Go tests with race detection and coverage"
    cmds:
      - go test -race -p {{.CPU_COUNT}} -parallel {{.PARALLEL_COUNT}} -cover ./...

  test::e2e:
    desc: "Run Testcontainers-backed end-to-end tests"
    cmds:
      - go test -tags=e2e -p {{.CPU_COUNT}} -parallel {{.PARALLEL_COUNT}} ./...

  build:
    desc: "Build the Consensus server"
    cmds:
      - go build -trimpath -ldflags '{{.LDFLAGS}}' -o /tmp/consensus ./cmd/consensus

  containers::up:
    desc: "Build and start the local Postgres + Consensus stack"
    cmds:
      - docker compose -f containers/docker-compose.yaml up --build -d

  containers::down:
    desc: "Stop the local container stack"
    cmds:
      - docker compose -f containers/docker-compose.yaml down

  containers::logs:
    desc: "Tail local Consensus container logs"
    cmds:
      - docker compose -f containers/docker-compose.yaml logs -f consensus
