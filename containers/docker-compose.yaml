---
name: consensus-local

services:
  postgres:
    image: timescale/timescaledb-ha:pg17
    command:
      - postgres
      - -c
      - shared_preload_libraries=timescaledb,pg_textsearch
    environment:
      POSTGRES_DB: consensus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${CONSENSUS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - consensus-postgres-data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d consensus"]
      interval: 5s
      timeout: 5s
      retries: 20

  consensus:
    build:
      context: ..
      dockerfile: containers/Dockerfile
    develop:
      watch:
        - action: rebuild
          path: ../cmd
        - action: rebuild
          path: ../internal
        - action: rebuild
          path: ../proto
        - action: rebuild
          path: ../containers/Dockerfile
        - action: rebuild
          path: ../go.mod
        - action: rebuild
          path: ../go.sum
        - action: rebuild
          path: ../buf.gen.yaml
        - action: rebuild
          path: ../buf.yaml
    environment:
      PORT: "8080"
      MCP_PORT: "8081"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/consensus?sslmode=disable"
      MIGRATE: "true"
    ports:
      - "${CONSENSUS_HTTP_PORT:-8080}:8080"
      - "${CONSENSUS_MCP_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  consensus-postgres-data:
