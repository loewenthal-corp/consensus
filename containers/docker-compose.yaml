---
name: consensus-local

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: consensus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${CONSENSUS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - consensus-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d consensus"]
      interval: 5s
      timeout: 5s
      retries: 20

  consensus:
    build:
      context: ..
      dockerfile: containers/Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/consensus?sslmode=disable"
      MIGRATE: "true"
    ports:
      - "${CONSENSUS_HTTP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  consensus-postgres-data:
